services:
  - type: web
    name: ai-smart-invest-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: ALLOWED_ORIGINS
        value: "https://ai-smart-invest.vercel.app,http://localhost:3000"
    region: oregon
    plan: free
